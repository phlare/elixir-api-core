services:
  postgres:
    image: postgres:16
    container_name: elixir_api_core_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: elixir_api_core_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d elixir_api_core_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
