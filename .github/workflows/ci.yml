name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: elixir_api_core_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d elixir_api_core_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir and Erlang
        uses: erlef/setup-beam@v1
        with:
          version-type: strict
          elixir-version: "1.19.5"
          otp-version: "28.3.3"

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run tests
        env:
          MIX_ENV: test
        run: mix test
