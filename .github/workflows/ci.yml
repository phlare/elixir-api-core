name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: elixir_api_core_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d elixir_api_core_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir and Erlang
        uses: erlef/setup-beam@v1
        with:
          version-type: strict
          elixir-version: "1.19.5"
          otp-version: "28.3.3"

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run tests
        env:
          MIX_ENV: test
        run: mix test

  openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint OpenAPI spec
        uses: stoplightio/spectral-action@latest
        with:
          file_glob: "priv/openapi/*.yaml"

      - name: Check if base spec exists
        if: github.event_name == 'pull_request'
        id: base-spec
        run: |
          BASE_REF=${{ github.event.pull_request.base.ref }}
          if git show "${BASE_REF}:priv/openapi/v1.yaml" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "No base spec on ${BASE_REF} yet — skipping breaking-change check."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for breaking changes
        if: github.event_name == 'pull_request' && steps.base-spec.outputs.exists == 'true'
        uses: oasdiff/oasdiff-action/breaking@main
        with:
          base: ${{ github.event.pull_request.base.ref }}:priv/openapi/v1.yaml
          revision: priv/openapi/v1.yaml
