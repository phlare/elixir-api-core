openapi: "3.1.0"
info:
  title: Elixir API Core
  version: "0.1.0"
  description: Multi-tenant identity, authentication, and authorization template API.

servers:
  - url: http://localhost:4000
    description: Local development

paths:
  /healthz:
    get:
      operationId: healthz
      summary: Health check
      tags: [Health]
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: ok

  /readyz:
    get:
      operationId: readyz
      summary: Readiness check (verifies DB connectivity)
      tags: [Health]
      responses:
        "200":
          description: API is ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: ok
        "503":
          description: Not ready (DB unreachable)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/auth/register:
    post:
      operationId: authRegister
      summary: Register a new user with email/password
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                display_name:
                  type: string
                account_name:
                  type: string
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/RegisterResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/auth/login:
    post:
      operationId: authLogin
      summary: Authenticate with email/password
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/auth/refresh:
    post:
      operationId: authRefresh
      summary: Rotate refresh token and issue new access token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: Tokens rotated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/TokenPair"
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/auth/logout:
    post:
      operationId: authLogout
      summary: Revoke a refresh token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: ok
        "401":
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/auth/google/start:
    get:
      operationId: authGoogleStart
      summary: Get Google OAuth authorize URL
      tags: [Auth, OAuth]
      responses:
        "200":
          description: Authorize URL returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      authorize_url:
                        type: string
                        format: uri
        "503":
          description: Google OAuth not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/auth/google/callback:
    get:
      operationId: authGoogleCallback
      summary: Handle Google OAuth callback
      tags: [Auth, OAuth]
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Existing user logged in
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/LoginResponse"
        "201":
          description: New user created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/RegisterResponse"
        "502":
          description: OAuth provider error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/auth/switch_account:
    post:
      operationId: authSwitchAccount
      summary: Switch to a different account
      tags: [Auth]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [account_id]
              properties:
                account_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Account switched
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      access_token:
                        type: string
                      account_id:
                        type: string
                        format: uuid
                      role:
                        type: string
                        enum: [owner, admin, member]
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Account not found or user not a member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/me:
    get:
      operationId: getMe
      summary: Get current user and account context
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user context
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      user:
                        $ref: "#/components/schemas/UserSummary"
                      account_id:
                        type: string
                        format: uuid
                      role:
                        type: string
                        enum: [owner, admin, member]
                      membership_id:
                        type: string
                        format: uuid
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true

    UserSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string

    AccountSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    TokenPair:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string

    RegisterResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserSummary"
        account:
          $ref: "#/components/schemas/AccountSummary"
        access_token:
          type: string
        refresh_token:
          type: string

    LoginResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserSummary"
        access_token:
          type: string
        refresh_token:
          type: string
        active_account_id:
          type: string
          format: uuid
        accounts:
          type: array
          items:
            type: object
            properties:
              account_id:
                type: string
                format: uuid
              role:
                type: string
                enum: [owner, admin, member]
